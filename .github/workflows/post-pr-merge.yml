name: Post-Merge Build

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-after-merge:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - uses: dtolnay/rust-toolchain@stable

    - uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build release
      run: cargo build --release --verbose

    - name: Prepare artifact
      shell: pwsh
      run: |
        mkdir release

        if (Test-Path "target/release/EdenExplorer.exe") {
          Copy-Item "target/release/EdenExplorer.exe" "release/EdenExplorer.exe"
        } elseif (Test-Path "target/release/eden_explorer.exe") {
          Copy-Item "target/release/eden_explorer.exe" "release/EdenExplorer.exe"
        } else {
          echo "❌ No binary found"
          exit 1
        }

    - uses: actions/upload-artifact@v4
      with:
        name: eden-explorer-pr-${{ github.event.pull_request.number }}
        path: release/
        retention-days: 30